name: Multi Environment Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Select deployment environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        run: echo "Deploying to ${{ github.event.inputs.environment }}"
